name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test tooling
        run: python -m pip install pytest ruff

      - name: Compile Python sources
        run: python -m compileall -q medea main.py utils.py

      - name: Lint Python sources
        run: ruff check medea main.py setup.py utils.py --select E9,F63,F7,F82

      - name: Run unit tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests -q
          else
            echo "No tests directory found; skipping pytest discovery."
          fi
